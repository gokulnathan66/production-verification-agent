version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=a2a_dashboard
      - POSTGRES_USER=a2a_user
      - POSTGRES_PASSWORD=a2a_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a_user -d a2a_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  code-logic-agent:
    build:
      context: ..
      dockerfile: src/Dockerfile.agent
      args:
        AGENT_DIR: code_logic_agent
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - workspace-data:/tmp/workspace:ro  # Read-only access to shared workspace
    networks:
      - a2a-network

  research-agent:
    build:
      context: ..
      dockerfile: src/Dockerfile.agent
      args:
        AGENT_DIR: research_agent
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - workspace-data:/tmp/workspace:ro  # Read-only access to shared workspace
    networks:
      - a2a-network

  test-run-agent:
    build:
      context: ..
      dockerfile: src/Dockerfile.agent
      args:
        AGENT_DIR: test_run_agents
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - workspace-data:/tmp/workspace:ro  # Read-only access to shared workspace
    networks:
      - a2a-network

  validation-agent:
    build:
      context: ..
      dockerfile: src/Dockerfile.agent
      args:
        AGENT_DIR: validation_agent
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - workspace-data:/tmp/workspace:ro  # Read-only access to shared workspace
    networks:
      - a2a-network

  orchestrator-agent:
    build:
      context: ..
      dockerfile: src/Dockerfile.agent
      args:
        AGENT_DIR: orchestorator_agent
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_ID=${MODEL_ID}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - CODE_LOGIC_AGENT_URL=http://code-logic-agent:8001
      - RESEARCH_AGENT_URL=http://research-agent:8003
      - TEST_RUN_AGENT_URL=http://test-run-agent:8004
      - VALIDATION_AGENT_URL=http://validation-agent:8005
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - workspace-data:/tmp/workspace:rw  # Read-write access for orchestrator
    depends_on:
      - code-logic-agent
      - research-agent
      - test-run-agent
      - validation-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/.well-known/agent-card.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: src/app/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - ORCHESTRATOR_URL=http://orchestrator-agent:8000
      - DATABASE_URL=postgresql://a2a_user:a2a_password@postgres:5432/a2a_dashboard
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator-agent:
        condition: service_healthy
    networks:
      - a2a-network

networks:
  a2a-network:
    driver: bridge

volumes:
  postgres-data:
  workspace-data:  # Shared workspace for code analysis across all agents
